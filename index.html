<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The AlabamaProgramma Returns Soon</title>
  <meta property="og:title" content="The AlabamaProgramma Returns Soon" />
  <meta property="og:description" content="Something new is taking shape." />
  <style>
    :root {
      --purple: #8a2be2;
      --deep:   #3b0a5c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #05010a;
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    }
    /* canvas holds the drifting nebula / smoke field */
    #fx {
      position: fixed;
      inset: 0;
      display: block;
      z-index: 0;
      /* heavy blur fuses the moving blobs into smoke */
      filter: blur(45px) saturate(1.25);
      opacity: 0.9;
    }
    /* sharp star layer sits above the blurred nebula, below the text */
    #stars {
      position: fixed;
      inset: 0;
      display: block;
      z-index: 1;
    }
    /* foreground stars sit ABOVE the text so the logo nests in the field */
    #starsFront {
      position: fixed;
      inset: 0;
      display: block;
      z-index: 4;
      pointer-events: none; /* taps still reach the page (iOS motion unlock) */
    }
    /* subtle drifting radial glow behind everything */
    .aura {
      position: fixed;
      inset: -20%;
      z-index: 0;
      background:
        radial-gradient(circle at 30% 35%, rgba(138,43,226,0.28), transparent 45%),
        radial-gradient(circle at 70% 65%, rgba(75,0,130,0.30), transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(40,0,70,0.25), transparent 60%);
      filter: blur(20px);
      animation: drift 18s ease-in-out infinite alternate;
    }
    @keyframes drift {
      0%   { transform: translate(-2%, -1%) scale(1.05); }
      100% { transform: translate(2%, 1%)  scale(1.15); }
    }

    .stage {
      position: relative;
      z-index: 2;
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 6vw;
    }

    .title {
      font-size: clamp(2rem, 7vw, 6rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1.1;
      color: #f3e9ff;
      text-shadow:
        0 0 8px rgba(138,43,226,0.9),
        0 0 24px rgba(138,43,226,0.7),
        0 0 60px rgba(75,0,130,0.8),
        0 0 110px rgba(75,0,130,0.6);
      animation: breathe 4.5s ease-in-out infinite;
    }
    .title .accent {
      background: linear-gradient(90deg, #c08bff, #8a2be2, #5a189a, #c08bff);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: flow 8s linear infinite;
    }
    @keyframes flow {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.92; transform: scale(1); }
      50%      { opacity: 1;    transform: scale(1.015); }
    }

    .sub {
      margin-top: 1.6rem;
      font-size: clamp(0.8rem, 2vw, 1.15rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #b388e8;
      opacity: 0.85;
    }
    .dots::after {
      content: "";
      animation: dots 2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ""; }
      25%  { content: "."; }
      50%  { content: ".."; }
      75%  { content: "..."; }
      100% { content: ""; }
    }

    /* mobile motion hint pill */
    .hint {
      position: fixed;
      left: 50%;
      bottom: 5vh;
      transform: translateX(-50%) translateY(12px);
      z-index: 6;
      display: flex;
      align-items: center;
      gap: 0.55em;
      padding: 0.7em 1.2em;
      border-radius: 999px;
      font-size: clamp(0.72rem, 3.4vw, 0.95rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #efe4ff;
      background: rgba(40, 8, 70, 0.45);
      border: 1px solid rgba(192, 139, 255, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 0 24px rgba(138, 43, 226, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .hint.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .hint .ico {
      font-size: 1.2em;
      animation: tiltwave 1.8s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes tiltwave {
      0%, 100% { transform: rotate(-14deg); }
      50%      { transform: rotate(14deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .aura, .title, .accent, .hint .ico { animation: none; }
    }
  </style>
</head>
<body>
  <div class="aura"></div>
  <canvas id="fx"></canvas>
  <canvas id="stars"></canvas>
  <canvas id="starsFront"></canvas>

  <div class="stage">
    <h1 class="title">The <span class="accent">AlabamaProgramma</span> Returns Soon</h1>
    <div class="sub">Something new is taking shape<span class="dots"></span></div>
  </div>

  <div id="hint" class="hint"><span class="ico">📱</span><span id="hintText">Tap &amp; tilt to explore</span></div>

  <script>
    const canvas = document.getElementById("fx");
    const ctx = canvas.getContext("2d");
    let w, h, dpr;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = canvas.width = innerWidth * dpr;
      h = canvas.height = innerHeight * dpr;
      canvas.style.width = innerWidth + "px";
      canvas.style.height = innerHeight + "px";
    }
    resize();
    addEventListener("resize", resize);

    // Nebula / smoke field — a handful of large, soft purple clouds that
    // drift, swell and breathe. The heavy CSS blur on the canvas fuses them
    // into one slow-moving, smoky gradient.
    const palette = ["#8a2be2", "#5a189a", "#7b2fbf", "#3b0a5c", "#c08bff", "#4b0082"];
    const rnd = (a, b) => a + Math.random() * (b - a);
    const TAU = Math.PI * 2;

    const CLOUD_COUNT = 9;
    const clouds = Array.from({ length: CLOUD_COUNT }, makeCloud);

    function makeCloud() {
      const base = Math.min(w, h);
      return {
        // home position the cloud orbits around (in 0..1 space)
        hx: Math.random(),
        hy: Math.random(),
        // independent slow oscillation for x / y wandering
        ax: rnd(0.05, 0.22),      // wander amplitude
        ay: rnd(0.05, 0.22),
        fx: rnd(0.02, 0.06),      // wander frequency
        fy: rnd(0.02, 0.06),
        px: rnd(0, TAU),          // phase offsets
        py: rnd(0, TAU),
        r: rnd(0.35, 0.7) * base, // radius
        pr: rnd(0.04, 0.09) * base, // radius pulse amount
        fr: rnd(0.01, 0.03),      // pulse frequency
        pp: rnd(0, TAU),
        a: rnd(0.18, 0.4),        // peak alpha
        c: palette[(Math.random() * palette.length) | 0],
      };
    }

    // soft pointer influence — clouds lean gently toward the cursor
    let mx = 0.5, my = 0.5;
    addEventListener("pointermove", e => {
      mx = e.clientX / innerWidth;
      my = e.clientY / innerHeight;
    });

    let t = 0;

    function frame() {
      t += 0.18; // small step => slow, smoky drift

      // clear to the void each frame (blur + additive blending do the smoke)
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "#05010a";
      ctx.fillRect(0, 0, w, h);

      ctx.globalCompositeOperation = "lighter";
      for (const c of clouds) {
        const cx = (c.hx + Math.sin(t * c.fx + c.px) * c.ax
                    + (mx - 0.5) * 0.06) * w;
        const cy = (c.hy + Math.cos(t * c.fy + c.py) * c.ay
                    + (my - 0.5) * 0.06) * h;
        const radius = c.r + Math.sin(t * c.fr + c.pp) * c.pr;
        const alpha = c.a * (0.7 + 0.3 * Math.sin(t * c.fr * 1.3 + c.pp));

        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        g.addColorStop(0, hexA(c.c, alpha));
        g.addColorStop(0.5, hexA(c.c, alpha * 0.35));
        g.addColorStop(1, hexA(c.c, 0));
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, TAU);
        ctx.fill();
      }

      requestAnimationFrame(frame);
    }

    function hexA(hex, a) {
      const n = parseInt(hex.slice(1), 16);
      return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
    }

    frame();
  </script>

  <script>
    // ── Star layer ───────────────────────────────────────────────────────
    // Sharp twinkling stars (with parallax), slow glowing motes, and the
    // occasional shooting star streaking across the nebula. Lives on its own
    // unblurred canvas so the points stay crisp against the smoke below.
    const sky = document.getElementById("stars");
    const sx = sky.getContext("2d");
    const skyF = document.getElementById("starsFront"); // in front of the logo
    const sxF = skyF.getContext("2d");
    const fx = document.getElementById("fx"); // nebula canvas (back plane)
    let sw, sh, sdpr;
    const TAU2 = Math.PI * 2;
    const rng = (a, b) => a + Math.random() * (b - a);

    function sizeSky() {
      sdpr = Math.min(window.devicePixelRatio || 1, 2);
      sw = sky.width = skyF.width = innerWidth * sdpr;
      sh = sky.height = skyF.height = innerHeight * sdpr;
      sky.style.width = skyF.style.width = innerWidth + "px";
      sky.style.height = skyF.style.height = innerHeight + "px";
    }
    sizeSky();
    addEventListener("resize", () => { sizeSky(); buildStars(); });

    let stars, motes;
    function buildStars() {
      const n = Math.floor((innerWidth * innerHeight) / 3200) + 120;
      // overscan by ±18% so the parallax shift never reveals a bare edge
      stars = Array.from({ length: n }, () => {
        // ~18% are "near" stars: drawn in front of the logo, biggest parallax
        const front = Math.random() < 0.18;
        return {
          x: rng(-0.18, 1.18) * sw,
          y: rng(-0.18, 1.18) * sh,
          r: (front ? rng(1, 2.1) : rng(0.4, 1.5)) * sdpr,
          depth: front ? rng(0.9, 1.4) : rng(0.2, 0.85), // parallax factor
          base: front ? rng(0.55, 1) : rng(0.25, 0.9),   // base brightness
          tw: rng(0.6, 2.2),                 // twinkle speed
          ph: rng(0, TAU2),
          warm: Math.random() < 0.25,        // some lean lilac/white
          front,
        };
      });
      // a few larger, slow glowing motes for depth
      const m = 14;
      motes = Array.from({ length: m }, () => ({
        x: Math.random() * sw,
        y: Math.random() * sh,
        r: rng(2, 5) * sdpr,
        vx: rng(-0.08, 0.08) * sdpr,
        vy: rng(-0.05, 0.05) * sdpr,
        a: rng(0.05, 0.2),
        ph: rng(0, TAU2),
        tw: rng(0.3, 0.9),
      }));
    }
    buildStars();

    // parallax follows the pointer a touch (desktop)
    let pmx = 0, pmy = 0;
    addEventListener("pointermove", e => {
      pmx = (e.clientX / innerWidth - 0.5) * sdpr;
      pmy = (e.clientY / innerHeight - 0.5) * sdpr;
    });

    // device-tilt parallax (mobile gyroscope) — works on iOS once granted.
    let tiltTX = 0, tiltTY = 0;            // target offsets, ~ -1..1
    let tiltX = 0, tiltY = 0;             // smoothed
    let baseBeta = null, baseGamma = null; // neutral reference (first reading)
    const clamp1 = v => v < -1 ? -1 : v > 1 ? 1 : v;

    function onOrient(e) {
      if (e.gamma == null || e.beta == null) return;
      let g = e.gamma; // left-right tilt  [-90..90]
      let b = e.beta;  // front-back tilt  [-180..180]
      // remap for landscape so "tilt" stays intuitive
      const so = (screen.orientation && screen.orientation.angle);
      const ang = so == null ? (window.orientation || 0) : so;
      if (ang === 90)            { const t = g; g = -b; b = t; }
      else if (ang === -90 || ang === 270) { const t = g; g = b; b = -t; }
      if (baseGamma === null) { baseGamma = g; baseBeta = b; }
      // /30 => gentler: needs a fuller tilt, so motion reads smooth not twitchy
      tiltTX = clamp1((g - baseGamma) / 30);
      tiltTY = clamp1((b - baseBeta) / 30);
      gotTilt = true;
    }

    // iOS 13+ gates motion behind a permission prompt that needs a user gesture.
    let tiltArmed = false, gotTilt = false;
    function enableTilt() {
      if (tiltArmed) return;
      const D = window.DeviceOrientationEvent;
      if (D && typeof D.requestPermission === "function") {
        D.requestPermission().then(state => {
          if (state === "granted") {
            tiltArmed = true;
            addEventListener("deviceorientation", onOrient, true);
          }
        }).catch(() => {});
      } else if (D) {
        tiltArmed = true;
        addEventListener("deviceorientation", onOrient, true);
      }
    }
    // Android / non-gated browsers attach right away; iOS attaches on first tap.
    enableTilt();
    addEventListener("touchend", enableTilt, { passive: true });
    addEventListener("click", enableTilt);

    // shooting stars
    const shooters = [];
    let nextShoot = 60;
    function spawnShooter() {
      const fromLeft = Math.random() < 0.5;
      const angle = rng(0.18, 0.42) * (fromLeft ? 1 : -1) + (fromLeft ? 0 : Math.PI);
      const speed = rng(9, 16) * sdpr;
      shooters.push({
        x: fromLeft ? rng(-0.1, 0.4) * sw : rng(0.6, 1.1) * sw,
        y: rng(-0.05, 0.4) * sh,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        len: rng(120, 260) * sdpr,
        life: 0,
        max: rng(45, 80),
      });
    }

    let st = 0;
    function skyFrame() {
      st += 1;
      sx.clearRect(0, 0, sw, sh);
      sxF.clearRect(0, 0, sw, sh);
      sxF.globalCompositeOperation = "lighter";

      // heavy easing => slow, smooth glide that absorbs gyro jitter
      tiltX += (tiltTX - tiltX) * 0.04;
      tiltY += (tiltTY - tiltY) * 0.04;
      // combined parallax: pointer (desktop) + gyroscope (mobile).
      const reach = Math.min(sw, sh) * 0.14;
      const parX = pmx * 18 + tiltX * reach;
      const parY = pmy * 18 + tiltY * reach;

      // push the blurred nebula the opposite way for a deep back-plane
      // (slight scale-up so the shift never bares an edge)
      if (gotTilt || pmx || pmy) {
        fx.style.transform =
          `translate(${-(parX) * 0.5 / sdpr}px, ${-(parY) * 0.5 / sdpr}px) scale(1.12)`;
      }

      // motes (soft additive blobs) — mid-depth plane, half the star parallax
      sx.globalCompositeOperation = "lighter";
      for (const m of motes) {
        m.x += m.vx; m.y += m.vy; m.ph += 0.01 * m.tw;
        if (m.x < -20) m.x = sw + 20; if (m.x > sw + 20) m.x = -20;
        if (m.y < -20) m.y = sh + 20; if (m.y > sh + 20) m.y = -20;
        const mx2 = m.x + parX * 0.5, my2 = m.y + parY * 0.5;
        const a = m.a * (0.6 + 0.4 * Math.sin(m.ph));
        const g = sx.createRadialGradient(mx2, my2, 0, mx2, my2, m.r * 8);
        g.addColorStop(0, `rgba(200,160,255,${a})`);
        g.addColorStop(1, "rgba(200,160,255,0)");
        sx.fillStyle = g;
        sx.beginPath();
        sx.arc(mx2, my2, m.r * 8, 0, TAU2);
        sx.fill();
      }

      // stars (sharp, twinkling, parallax by depth).
      // "front" stars render on the top canvas so the logo sits among them.
      for (const s of stars) {
        s.ph += 0.02 * s.tw;
        const tw = 0.55 + 0.45 * Math.sin(s.ph);
        const alpha = s.base * tw;
        const x = s.x + parX * s.depth;
        const y = s.y + parY * s.depth;
        const c = s.front ? sxF : sx;
        c.fillStyle = s.warm
          ? `rgba(220,200,255,${alpha})`
          : `rgba(255,255,255,${alpha})`;
        c.beginPath();
        c.arc(x, y, s.r, 0, TAU2);
        c.fill();
        // tiny glow on the brighter ones (kept sparse so the dense field stays cheap)
        if (s.r > 1.35 * sdpr) {
          const g = c.createRadialGradient(x, y, 0, x, y, s.r * 6);
          g.addColorStop(0, `rgba(200,170,255,${alpha * 0.5})`);
          g.addColorStop(1, "rgba(200,170,255,0)");
          c.fillStyle = g;
          c.beginPath();
          c.arc(x, y, s.r * 6, 0, TAU2);
          c.fill();
        }
      }

      // shooting stars
      if (--nextShoot <= 0) {
        spawnShooter();
        nextShoot = Math.floor(rng(120, 320)); // ~2–5s between streaks @60fps
      }
      for (let i = shooters.length - 1; i >= 0; i--) {
        const sh2 = shooters[i];
        sh2.x += sh2.vx; sh2.y += sh2.vy; sh2.life++;
        const fade = sh2.life < 10 ? sh2.life / 10
                   : Math.max(0, 1 - (sh2.life - 10) / (sh2.max - 10));
        const tx = sh2.x - sh2.vx / Math.hypot(sh2.vx, sh2.vy) * sh2.len;
        const ty = sh2.y - sh2.vy / Math.hypot(sh2.vx, sh2.vy) * sh2.len;
        const grad = sx.createLinearGradient(sh2.x, sh2.y, tx, ty);
        grad.addColorStop(0, `rgba(240,225,255,${0.9 * fade})`);
        grad.addColorStop(0.4, `rgba(170,110,255,${0.5 * fade})`);
        grad.addColorStop(1, "rgba(138,43,226,0)");
        sx.strokeStyle = grad;
        sx.lineWidth = 2 * sdpr;
        sx.lineCap = "round";
        sx.beginPath();
        sx.moveTo(sh2.x, sh2.y);
        sx.lineTo(tx, ty);
        sx.stroke();
        // bright head
        const hg = sx.createRadialGradient(sh2.x, sh2.y, 0, sh2.x, sh2.y, 6 * sdpr);
        hg.addColorStop(0, `rgba(255,255,255,${fade})`);
        hg.addColorStop(1, "rgba(255,255,255,0)");
        sx.fillStyle = hg;
        sx.beginPath();
        sx.arc(sh2.x, sh2.y, 6 * sdpr, 0, TAU2);
        sx.fill();

        if (sh2.life >= sh2.max || sh2.x < -300 || sh2.x > sw + 300 || sh2.y > sh + 300) {
          shooters.splice(i, 1);
        }
      }

      requestAnimationFrame(skyFrame);
    }
    skyFrame();

    // ── Motion hint ──────────────────────────────────────────────────────
    // Show a little pill on touch devices nudging the user to tap (which also
    // unlocks iOS motion) and tilt. It swaps to "Tilt your phone" once motion
    // is live, then fades away.
    const hint = document.getElementById("hint");
    const hintText = document.getElementById("hintText");
    const isTouch = matchMedia("(pointer: coarse)").matches || "ontouchstart" in window;

    if (isTouch && hint) {
      setTimeout(() => hint.classList.add("show"), 900);

      let phase2 = false;
      const watch = setInterval(() => {
        if (gotTilt && !phase2) {
          // motion is flowing — celebrate, then fade out
          phase2 = true;
          hintText.textContent = "Tilt your phone";
          setTimeout(() => hint.classList.remove("show"), 2600);
          clearInterval(watch);
        }
      }, 200);

      // hide on tap regardless, after a beat (so the gesture still arms iOS)
      addEventListener("touchend", () => {
        setTimeout(() => { if (!gotTilt) hint.classList.remove("show"); }, 4000);
      }, { once: true });

      // safety net: never let it linger forever
      setTimeout(() => hint.classList.remove("show"), 12000);
    }
  </script>
</body>
</html>
